version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: casn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casn_password}
      POSTGRES_DB: ${POSTGRES_DB:-casn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-casn_user} -d $${POSTGRES_DB:-casn_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casn_network

  redis:
    image: redis:7-alpine
    container_name: casn_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casn_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casn_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-casn_user}:${POSTGRES_PASSWORD:-casn_password}@postgres:5432/${POSTGRES_DB:-casn_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-secret_panjang_dan_acak_casn_123}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh_secret_panjang_acak_casn_123}
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - casn_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_ENABLE_WEBSOCKET: ${NEXT_PUBLIC_ENABLE_WEBSOCKET:-true}
    container_name: casn_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend
    networks:
      - casn_network

  nginx:
    image: nginx:alpine
    container_name: casn_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - casn_network
      - web

networks:
  casn_network:
    driver: bridge
  # 'web' = network bersama reverse-proxy (proxy_nginx). Buat sekali: docker network create web
  web:
    external: true
    name: web

volumes:
  postgres_data:
  redis_data:
  uploads_data:
